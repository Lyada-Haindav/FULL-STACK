server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE:form_weaver}
      auto-index-creation: true
  mail:
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  mail:
    from: ${SMTP_FROM:no-reply@formweaver.local}

logging:
  level:
    org.springframework.data.mongodb: warn
