# Production Configuration for Spring Boot

# Server Configuration
server.port=8080
server.address=127.0.0.1

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/form_weaver
spring.datasource.username=formweaver
spring.datasource.password=secure_password_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=WARN
logging.level.com.formweaverai=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=ERROR

# Security Configuration
spring.security.require-ssl=true

# CORS Configuration
spring.web.cors.allowed-origins=https://your-frontend-domain.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Application Configuration
spring.application.name=form-weaver-backend
spring.profiles.active=prod

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
