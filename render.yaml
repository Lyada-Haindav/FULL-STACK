services:
  - type: web
    name: formweaver-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: Dockerfile
    autoDeploy: true
    healthCheckPath: /api/templates
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: form_weaver
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEMO_USER_EMAIL
        value: demo@formweaver.local
      - key: DEMO_USER_PASSWORD
        value: demo1234
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: APP_FRONTEND_URL
        sync: false
